<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShoeStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 2px;
        }

        nav {
            background: #222;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        nav a:hover {
            color: #ff4d4d;
        }

        .hero {
            height: 60vh;
            background: url('https://images.unsplash.com/photo-1542291026-7eec264c27ff') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
        }

        .container {
            padding: 40px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .card-body h3 {
            margin-bottom: 10px;
        }

        .price {
            color: #ff4d4d;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #111;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #ff4d4d;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>👟 BirusStore</header>

<nav>
    <a href="#">Главная</a>
    <a href="#">Каталог</a>
    <a href="#">О нас</a>
    <a href="#">Контакты</a>
</nav>

<section class="hero">
    Стиль начинается с обуви
</section>

<div class="container">
    <h2 style="margin-bottom:20px;">Популярные модели</h2>

    <div class="products">
        
        <div class="card">
            <img src="https://static.nike.com/a/images/t_web_pdp_535_v2/f_auto/6a3671b8-f115-44f6-9ab6-3798d55210eb/AIR+MAX+97+NBY.png" alt="">
            <div class="card-body">
                <h3>Nike Air Max 97</h3>
                <p class="price">$200</p>
                <a href="https://t.me/riskBIRUS" class="btn" target="_blank">Купить</a>
            </div>
        </div>

        <div class="card">
            <img src="https://static.nike.com/a/images/t_web_pw_592_v2/f_auto/u_9ddf04c7-2a9a-4d76-add1-d15af8f0263d,c_scale,fl_relative,w_1.0,h_1.0,fl_layer_apply/1b0c88ac-202d-4335-a864-1907e95c732b/W+AIR+MAX+DN.png" alt="">
            <div class="card-body">
                <h3>Nike Air Max Dn</h3>
                <p class="price">$117</p>
                <a href="https://t.me/riskBIRUS" class="btn" target="_blank">Купить</a>
            </div>
        </div>

        <div class="card">
            <img src="https://static.nike.com/a/images/t_web_pw_592_v2/f_auto/u_9ddf04c7-2a9a-4d76-add1-d15af8f0263d,c_scale,fl_relative,w_1.0,h_1.0,fl_layer_apply/bhwrvokud9flh34cchb8/AIR+MAX+90.png" alt="">
            <div class="card-body">
                <h3>Nike Air Max 90</h3>
                <p class="price">$135</p>
                <a href="https://t.me/riskBIRUS" class="btn" target="_blank">Купить</a>
            </div>
        </div>

    </div>
</div>
